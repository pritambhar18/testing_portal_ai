<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Test Reports - QA Testing Portal</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --page: #f5f7fb;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --ink: #111827;
            --muted: #667085;
            --line: #d8dee9;
            --accent: #0f766e;
            --accent-strong: #115e59;
            --blue: #1d4ed8;
        }

        body {
            background: var(--page);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--ink);
        }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--line);
            box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--accent-strong) !important;
        }

        .container-main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            color: var(--ink);
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .page-header p {
            font-size: 1.1rem;
            color: var(--muted);
        }

        .content-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
            overflow: hidden;
        }

        .card-header {
            background: var(--surface-soft);
            color: var(--ink);
            padding: 20px 30px;
            border-bottom: 1px solid var(--line);
        }

        .card-header h2 {
            font-size: 1.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-body {
            padding: 30px;
        }

        .table-responsive {
            overflow-x: auto;
        }

        .reports-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 0;
        }

        .reports-table thead {
            background-color: var(--surface-soft);
            border-bottom: 1px solid var(--line);
        }

        .reports-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: var(--muted);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .reports-table td {
            padding: 15px;
            border-bottom: 1px solid var(--line);
            color: var(--ink);
        }

        .reports-table tbody tr {
            transition: background-color 0.3s ease;
        }

        .reports-table tbody tr:hover {
            background-color: #fbfcff;
        }

        .reports-table tbody tr:last-child td {
            border-bottom: none;
        }

        .id-badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .test-link {
            color: var(--accent-strong);
            text-decoration: none;
            word-break: break-all;
            max-width: 400px;
            display: inline-block;
        }

        .test-link:hover {
            text-decoration: underline;
            color: var(--accent);
        }

        .view-report-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .view-report-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(15, 118, 110, 0.18);
            color: white;
            text-decoration: none;
        }

        .view-report-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
        }

        .empty-state-icon {
            font-size: 64px;
            color: #dee2e6;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            color: #666;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #999;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .spinner-border-lg {
            width: 3rem;
            height: 3rem;
        }

        .loading-text {
            margin-left: 20px;
            color: var(--accent);
            font-weight: 600;
        }

        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
        }

        .alert-danger {
            background-color: #fee;
            color: #c00;
            border-left: 4px solid #c00;
        }

        .alert-success {
            background-color: #efe;
            color: #080;
            border-left: 4px solid #080;
        }

        .alert-info {
            background-color: #eef;
            color: #008;
            border-left: 4px solid #008;
        }

        .badge {
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 1.8rem;
            }

            .container-main {
                margin: 20px auto;
            }

            .card-body {
                padding: 15px;
            }

            .reports-table th,
            .reports-table td {
                padding: 10px;
                font-size: 0.85rem;
            }

            .test-link {
                max-width: 200px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-file-earmark-text me-2"></i>QA Testing Portal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/view-reports">View Reports</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/api/health">Health Check</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-main">
        <!-- Page Header -->
        <div class="page-header">
            <h1><i class="bi bi-file-earmark-pdf"></i> Test Reports</h1>
            <p>View all generated Selenium test execution reports</p>
        </div>

        <!-- Content Card -->
        <div class="content-card">
            <div class="card-header">
                <h2>
                    <i class="bi bi-table"></i> Test Reports Table
                </h2>
            </div>

            <div class="card-body">
                <!-- Alert Messages -->
                <div id="alertContainer"></div>

                <!-- Loading State -->
                <div id="loadingState" class="loading-spinner" style="display: none;">
                    <div class="spinner-border spinner-border-lg" style="color: #667eea;" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <div class="loading-text">Loading reports...</div>
                </div>

                <!-- Reports Table -->
                <div id="tableContainer" style="display: none;">
                    <div class="table-responsive">
                        <table class="reports-table">
                            <thead>
                                <tr>
                                    <th style="width: 8%;">ID</th>
                                    <th style="width: 40%;">Test Link</th>
                                    <th style="width: 20%;">Execution Date</th>
                                    <th style="width: 18%;">Report</th>
                                    <th style="width: 14%;">Created At</th>
                                </tr>
                            </thead>
                            <tbody id="reportsTableBody">
                                <!-- Reports will be populated here -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Empty State -->
                <div id="emptyState" style="display: none;">
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <i class="bi bi-inbox"></i>
                        </div>
                        <h3>No Reports Available</h3>
                        <p>Run a test to generate your first report</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /**
         * Show alert message
         */
        function showAlert(type, message) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            container.appendChild(alert);

            // Auto-remove after 5 seconds
            setTimeout(() => alert.remove(), 5000);
        }

        /**
         * Format date to readable format
         */
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        /**
         * Create table row from report data
         */
        function createReportRow(report) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>
                    <span class="id-badge">#${report.id}</span>
                </td>
                <td>
                    <a href="${report.test_link}" target="_blank" class="test-link" rel="noopener noreferrer" title="${report.test_link}">
                        ${report.test_link}
                    </a>
                </td>
                <td>
                    ${formatDate(report.execution_date)}
                </td>
                <td>
                    <div class="d-flex gap-2 flex-wrap">
                        <a href="/reports/${report.id}" target="_blank" rel="noopener noreferrer" class="view-report-btn" title="View PDF report">
                            <i class="bi bi-eye"></i> View
                        </a>
                        <a href="/reports/${report.id}/download" download class="view-report-btn" title="Download PDF report">
                            <i class="bi bi-download"></i> Download
                        </a>
                    </div>
                </td>
                <td>
                    ${formatDate(report.created_at)}
                </td>
            `;

            return row;
        }

        /**
         * Load and display reports
         */
        async function loadReports() {
            const loadingState = document.getElementById('loadingState');
            const tableContainer = document.getElementById('tableContainer');
            const emptyState = document.getElementById('emptyState');
            const tableBody = document.getElementById('reportsTableBody');

            try {
                // Show loading state
                loadingState.style.display = 'flex';
                tableContainer.style.display = 'none';
                emptyState.style.display = 'none';

                // Fetch reports from API
                const token = localStorage.getItem('qa_portal_token');
                const response = await fetch('/api/get-test-reports', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // Handle response
                if (!data.success) {
                    throw new Error(data.error || 'Failed to fetch reports');
                }

                // Hide loading state
                loadingState.style.display = 'none';

                // Check if there are reports
                if (!data.data || data.data.length === 0) {
                    emptyState.style.display = 'block';
                } else {
                    // Populate table
                    tableBody.innerHTML = '';
                    data.data.forEach(report => {
                        tableBody.appendChild(createReportRow(report));
                    });
                    tableContainer.style.display = 'block';

                    showAlert('success', `Loaded ${data.count} report(s) successfully`);
                }

            } catch (error) {
                loadingState.style.display = 'none';
                emptyState.style.display = 'block';
                console.error('Error loading reports:', error);
                showAlert('danger', `Error: ${error.message}`);
            }
        }

        /**
         * Load reports on page load
         */
        document.addEventListener('DOMContentLoaded', () => {
            loadReports();

            // Refresh every 30 seconds
            setInterval(loadReports, 30000);
        });
    </script>
</body>
</html>
